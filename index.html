<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Quote Generator</h1>

    <div class="categories">
    <button onclick="setMood('all')">🌼 All</button>
    <button onclick="setMood('calm')">🌊 Calm</button>
    <button onclick="setMood('focus')">📘 Focus</button>
    <button onclick="setMood('happy')">🌸 Happy</button>
</div>

    <div class="quote-box">
        <p id="quote">Click the button to get a quote</p>
        <h3 id="author"></h3>
    </div>

    <button onclick="getQuote()">Get Quote</button>

    <button onclick="saveQuote()">⭐ Save Quote</button>
<button onclick="viewFavorites()">📂 View Favorites</button>

<div id="favorites"></div>
</div>

<script src="script.js"></script>
</body>
</html>
