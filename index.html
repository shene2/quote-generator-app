<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotable</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card" id="card">
  <div class="blob blob1" id="b1"></div>
  <div class="blob blob2" id="b2"></div>

  <div class="card-inner">
    <div class="top-row">
      <div class="logo">Quotable</div>
      <div class="counter" id="counter">0 shown</div>
    </div>

    <div class="moods" id="moods">
      <button class="mood-btn active" data-mood="all"   data-color="#f7f4ff" data-blob="#ffe066" data-accent="#7c3aed">All</button>
      <button class="mood-btn"        data-mood="calm"  data-color="#f0faff" data-blob="#80ffe8" data-accent="#0ea5e9">Calm</button>
      <button class="mood-btn"        data-mood="focus" data-color="#fff8f0" data-blob="#ffa94d" data-accent="#f59e0b">Focus</button>
      <button class="mood-btn"        data-mood="happy" data-color="#fff0f6" data-blob="#ff7eb3" data-accent="#ec4899">Happy</button>
    </div>

    <div class="quote-box" id="qbox">
      <div class="bigq" id="bigq">"</div>
      <p id="quote">Press the button and get inspired.</p>
      <p id="author"></p>
    </div>

    <div class="actions">
      <button class="btn-get" id="getBtn">New quote</button>
      <button class="btn-sq" id="saveBtn" title="Save">★</button>
      <button class="btn-sq" id="favBtn" title="Saved">☰</button>
    </div>

    <div class="fav-panel" id="favPanel">
      <div style="height:16px"></div>
      <div class="fav-head">Saved quotes</div>
      <div id="favList"></div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
